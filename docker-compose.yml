services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:Ho2025@postgres:5432/mental_health_app
      - JWT_SECRET=your-secret-key-change-in-production
      - OPENAI_API_KEY=your-openai-api-key
      - OLLAMA_API_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:0.5b
      - USE_OLLAMA=true
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:14
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=mental_health_app
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Ho2025
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mental_health_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    networks:
      - app-network

  # Servicio para inicializar Ollama con el modelo
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    volumes:
      - ./scripts/init-ollama.sh:/init-ollama.sh:ro
    command: ["sh", "/init-ollama.sh"]
    networks:
      - app-network
    restart: "no"

volumes:
  ollama_data:
    driver: local
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge 